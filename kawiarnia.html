<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kawiarnia</title>
    <link rel="stylesheet" href="stylKawiarnia.css">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
</head>
<body>
    <nav id="main-nav">
        <img src="logo.png" alt="logo" id="logo">
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <span></span>      <!--W spanach nic nie musi być-->
            <span></span>
            <span></span>
        </label>
        <ul class="nav-links">
            <li><a href="#">Start</a></li>
            <li><a href="#">Oferta</a></li>
            <li><a href="#">O nas</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>
    </nav>

    <main id="main">
        <section id="heros">
            <span id="herobgr"></span>
            <span id="heroimg"></span>
            <div id="herotitle"> 
                <img src="lapki.png" alt="łapka">
                <p>Łapka w Latte</p>
                <a href="potemdodam"><button>Zobacz menu</button></a>
            </div>
        </section>

        <section class="container">
            <h1>Oferta:</h1>
            <section id="kawy">
                <section class="kawa">
                    <h2>Łapka w Latte</h2>
                    <img src="latte.png" alt="Latte">
                    <p>Delikatne latte z pianką w kształcie kociej łapki.</p>
                </section>
                <section class="kawa">
                    <h2>Mruczące Cappuccino</h2>
                    <img src="cappuccino.png" alt="Cappuccino">
                    <p>Cappuccino z pianką miękką niczym kocie futerko.</p>
                </section>
                <section class="kawa">
                    <h2>Czarna Łapka</h2>
                    <img src="czarna.png" alt="Czarna">
                    <p>Klasyczna czarna kawa z nutą kociego uroku, czasem nawet i sierści.</p>
                </section>
            </section>
        </section>

        <section class="container">
            <h1>O nas:</h1>
            <section id="abtus">
                <p></p>
            </section>
        </section>
    </main>
</body>
</html>
